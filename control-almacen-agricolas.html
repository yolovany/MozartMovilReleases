  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    // Nested page bundles (iframe targets). Each ships ONCE, in the ROOT
    // document's manifest; frame srcs carry an about:blank#<uuid> marker
    // instead of a substitutable uuid. Every document mints the blobs for
    // its OWN frames — from local text at the root, or text obtained from
    // its DIRECT parent over the relay protocol below — so each frame
    // navigation stays same-origin with its initiator and a deduped page
    // loads at any depth on any host, including a file:// download's
    // opaque origins (where a blob minted by one document cannot be
    // navigated to by another).
    const pageOrderEl = document.querySelector('script[type="__bundler/page_order"]');
    const pageOrder = pageOrderEl ? JSON.parse(pageOrderEl.textContent) : [];
    const pageSet = new Set(pageOrder);
    const pageTexts = {};

    // ── Nested-page text protocol (parent-chain relay) ──
    // Page bundles ship once, in the ROOT document's manifest. Every
    // document mints the blobs for its OWN frames, obtaining page text
    // through a strict parent-chain relay: a document only ever SENDS to
    // its direct parent (which, for every document the publisher's own
    // runtime minted, is another publisher document) and only ACCEPTS
    // text from that direct parent; requests from below are honored only
    // for the document's own child frames, and the ROOT never sends
    // upward at all. That last rule is load-bearing: the artifact host's
    // frame-ancestors allows claude.ai (and friends) to frame an
    // artifact, so window.top can be a FOREIGN document — a top-addressed
    // protocol would hand page uuids to that ancestor and accept forged
    // "page text" from it, minting attacker HTML as an artifact-origin
    // blob document. The chain never touches the ancestor: requests stop
    // at the root, replies are origin-addressed per hop (never '*' when
    // an origin exists), and both directions are origin-gated (on https
    // a foreign sender's origin can never equal this document's; in
    // opaque contexts — file:// — everything serializes as 'null', where
    // an embedded EXTERNAL frame still fails the gate by carrying its
    // own real origin, and a sandboxed child of such a frame is excluded
    // by the own-child-frames check plus uuid unguessability). Shape is
    // deny-by-default: one request form, one reply form, no error
    // replies.
    // window.origin is the SERIALIZED SECURITY origin ('null' in opaque
    // contexts such as a sandboxed preview iframe) — location.origin is
    // computed from the URL and stays 'https://…' even when the document
    // is sandboxed, which would misgate every opaque chain.
    const OWN_TARGET = /^https?:[/][/]/.test(window.origin || '')
      ? window.origin
      : '*';
    function trustedOrigin(e) {
      if (e.origin === window.origin) return true; // https chains; opaque==opaque
      // file:// trees: Chrome serializes the file document's origin as
      // 'file://' while the blob: documents it mints serialize as 'null',
      // so the two legitimate shapes can never string-match — accept the
      // pair in both directions. https origins never serialize as either,
      // and sender identity (own child frame / direct parent) is checked
      // separately.
      return (
        (e.origin === 'null' &&
          (window.origin === 'file://' ||
            window.location.protocol === 'file:')) ||
        (/^file:/.test(e.origin) && window.origin === 'null')
      );
    }
    // Non-empty only in the root document (nested bundles ship an empty
    // island), so it doubles as the root marker: the root answers from
    // local text and treats a miss as authoritative — never relaying to
    // its (possibly foreign) parent.
    const isPageRoot = pageOrder.length > 0;
    const blobUrls = {};
    const resourceBlobs = {};
    const UUID_SHAPE = /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/;
    const pendingFrames = {}; // uuid -> [{el, frag}] awaiting text for own frames
    const pendingRelays = {}; // uuid -> [childWindow] awaiting text to pass down
    function mountPage(el, frag, text) {
      const pageBlob = new Blob([text], { type: 'text/html' });
      const u = URL.createObjectURL(pageBlob);
      resourceBlobs[u] = pageBlob;
      el.src = u + frag;
    }
    function deliverPage(uuid, text) {
      const frames = pendingFrames[uuid];
      delete pendingFrames[uuid];
      if (frames) for (const f of frames) mountPage(f.el, f.frag, text);
      const relays = pendingRelays[uuid];
      delete pendingRelays[uuid];
      if (relays) {
        for (const cw of relays) {
          try { cw.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
        }
      }
    }
    function ownFrameWindows() {
      const out = [];
      for (const f of Array.from(document.querySelectorAll('iframe'))) {
        try { if (f.contentWindow) out.push(f.contentWindow); } catch (err) { /* detached */ }
      }
      return out;
    }
    window.addEventListener('message', function (e) {
      const d = e.data;
      if (!d || typeof d !== 'object' || !e.source) return;
      // Origin gate first; the structural checks below (own-child-frames
      // for requests, direct-parent + solicited-uuid for replies, the
      // root's never-relay rule) are what hold in fully opaque chains
      // where origin strings can't discriminate — a sandboxed root's
      // FOREIGN wrapper still fails all three even though both serialize
      // as real-vs-'null' rather than matching.
      if (!trustedOrigin(e)) return;
      if (typeof d.__bundler_need === 'string' && UUID_SHAPE.test(d.__bundler_need)) {
        // Requests are honored only for this document's own child frames.
        if (ownFrameWindows().indexOf(e.source) < 0) return;
        const uuid = d.__bundler_need;
        const text = pageTexts[uuid];
        if (typeof text === 'string') {
          try { e.source.postMessage({ __bundler_page: uuid, __bundler_text: text }, OWN_TARGET); } catch (err) { /* gone */ }
          return;
        }
        if (isPageRoot || window.parent === window) return; // authoritative miss
        const waiting = pendingRelays[uuid];
        if (waiting) {
          if (waiting.indexOf(e.source) < 0) waiting.push(e.source);
          return;
        }
        // Never-answered uuids would otherwise accumulate forever under a
        // request spray; past the cap (far above any real page count) new
        // relays are dropped rather than remembered.
        if (Object.keys(pendingRelays).length >= 128) return;
        pendingRelays[uuid] = [e.source];
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      } else if (
        typeof d.__bundler_page === 'string' &&
        UUID_SHAPE.test(d.__bundler_page) &&
        typeof d.__bundler_text === 'string'
      ) {
        // The shape test is load-bearing beyond tidiness: the solicited
        // check below uses the in operator, which matches prototype keys
        // ('__proto__', 'constructor') — an unshaped key would reach
        // deliverPage and throw, painting the error banner.
        // Text is accepted only from the direct parent — the document
        // that minted this one.
        if (e.source !== window.parent || window.parent === window) return;
        if (!(d.__bundler_page in pendingFrames) && !(d.__bundler_page in pendingRelays)) return;
        deliverPage(d.__bundler_page, d.__bundler_text);
      }
    });

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (pageSet.has(uuid)) {
          pageTexts[uuid] = new TextDecoder().decode(finalBytes);
          return;
        }
        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    // Page uuids have no blob here — they ride inside about:blank#<uuid>
    // frame markers the pass below resolves after the swap.
    for (const uuid of uuids) {
      if (pageSet.has(uuid)) continue;
      template = template.split(uuid).join(blobUrls[uuid]);
    }

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);

    // Resolve page-frame markers: mint this document's own blob for each
    // framed page — from local text when this is the root, otherwise by
    // asking the direct parent over the relay protocol above. An
    // unanswered request leaves the frame on about:blank, the same
    // degraded state as a refused embed.
    {
      const MARKER = /^about:blank#([0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12})(#.*)?$/;
      const needed = [];
      for (const el of Array.from(document.querySelectorAll('iframe'))) {
        const m = MARKER.exec(el.getAttribute('src') || '');
        if (!m) continue;
        const text = pageTexts[m[1]];
        if (typeof text === 'string') {
          mountPage(el, m[2] || '', text);
        } else if (window.parent !== window && !isPageRoot) {
          const had = pendingFrames[m[1]];
          (pendingFrames[m[1]] = had || []).push({ el: el, frag: m[2] || '' });
          if (!had) needed.push(m[1]);
        }
      }
      for (const uuid of needed) {
        window.parent.postMessage({ __bundler_need: uuid }, OWN_TARGET);
      }
    }

    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }

    // Fullscreen toggle button. Added last (and re-added if the app wipes
    // body during a later render pass) so it survives app mount/hydration.
    function addFullscreenButton() {
      if (document.getElementById('__fs_btn__')) return;
      var btn = document.createElement('button');
      btn.id = '__fs_btn__';
      btn.title = 'Pantalla completa';
      btn.setAttribute('aria-label', 'Pantalla completa');
      btn.textContent = '⛶';
      btn.style.cssText = 'position:fixed;bottom:16px;right:16px;z-index:2147483647;width:44px;height:44px;border-radius:50%;border:none;background:rgba(9,20,89,0.85);color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.3);font-size:18px;';
      btn.addEventListener('click', function() {
        var el = document.documentElement;
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
          (el.requestFullscreen || el.webkitRequestFullscreen || function() {}).call(el);
        } else {
          (document.exitFullscreen || document.webkitExitFullscreen || function() {}).call(document);
        }
      });
      document.body.appendChild(btn);
    }
    addFullscreenButton();
    new MutationObserver(addFullscreenButton).observe(document.body, { childList: true });
    setTimeout(addFullscreenButton, 500);
    setTimeout(addFullscreenButton, 1500);
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

<img src=\"a4702e92-fbc9-434e-965c-b2201238da21\" style=\"width:44px;height:44px;object-fit:contain\"><\u002Fdiv>\n        <div style=\"font:600 26px 'Space Grotesk'\">MozartMovil<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"r\" style=\"font:500 24px Roboto;letter-spacing:4px;color:#9fb0ff;margin-bottom:18px;animation-delay:.08s\">CONTROL DE ALMACÉN<\u002Fdiv>\n      <h1 class=\"r\" style=\"margin:0;font:700 90px/0.98 'Space Grotesk';letter-spacing:-2px;animation-delay:.14s\">Tu almacén,<br>en la palma<br>de la mano.<\u002Fh1>\n      <p class=\"r\" style=\"max-width:640px;font:400 27px/1.5 Roboto;color:#c7d0ff;margin:32px 0 0;animation-delay:.22s\">Entradas, salidas, traspasos, requisiciones e inventario — capturado con el teléfono, escaneado y enviado a Mozart en tiempo real.<\u002Fp>\n      <div class=\"r\" style=\"display:flex;gap:14px;margin-top:44px;animation-delay:.3s\">\n        <span style=\"padding:12px 22px;border:1.5px solid rgba(255,255,255,.35);border-radius:999px;font:500 24px Roboto;color:#e6ebff\">Sin papel<\u002Fspan>\n        <span style=\"padding:12px 22px;border:1.5px solid rgba(255,255,255,.35);border-radius:999px;font:500 24px Roboto;color:#e6ebff\">Escaneo y trazabilidad<\u002Fspan>\n        <span style=\"padding:12px 22px;border:1.5px solid rgba(255,255,255,.35);border-radius:999px;font:500 24px Roboto;color:#e6ebff\">Tiempo real<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"flex:none;width:640px;display:flex;justify-content:center;position:relative\">\n      <div class=\"float\" style=\"position:relative;width:376px;height:772px;background:#0c1024;border-radius:44px;padding:13px;box-shadow:0 40px 90px rgba(4,10,50,.6), inset 0 0 0 2px #2a3358\">\n        <div style=\"width:100%;height:100%;background:#f6f7fb;border-radius:32px;overflow:hidden;display:flex;flex-direction:column\">\n          <div style=\"height:24px;background:#152bc4;display:flex;align-items:center;justify-content:space-between;padding:0 18px;color:#fff;font:500 11px Roboto\"><span>9:41<\u002Fspan><span style=\"letter-spacing:1px\">96%<\u002Fspan><\u002Fdiv>\n          <div style=\"height:54px;background:#1E38E5;display:flex;align-items:center;gap:10px;padding:0 12px\"><span style=\"color:#fff;font:500 17px Roboto\">MozartMovil<\u002Fspan><span style=\"flex:1\"><\u002Fspan><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\"><circle cx=\"12\" cy=\"12\" r=\"9\"><\u002Fcircle><path d=\"M12 8v4M12 16h.01\" stroke-linecap=\"round\"><\u002Fpath><\u002Fsvg><svg width=\"20\" height=\"20\" sc-camel-view-box=\"0 0 24 24\" fill=\"none\" stroke=\"#fff\" stroke-width=\"1.8\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"12\" cy=\"12\" r=\"3\"><\u002Fcircle><path d=\"M19.4 13a7 7 0 0 0 0-2l1.7-1.3-2-3.4-2 .8a7 7 0 0 0-1.7-1L14.8 4h-3.9l-.4 2.1a7 7 0 0 0-1.7 1l-2-.8-2 3.4L4.6 11a7 7 0 0 0 0 2l-1.7 1.3 2 3.4 2-.8a7 7 0 0 0 1.7 1l.4 2.1h3.9l.4-2.1a7 7 0 0 0 1.7-1l2 .8 2-3.4z\"><\u002Fpath><\u002Fsvg><\u002Fdiv>\n          <div style=\"flex:1;padding:12px;display:flex;flex-direction:column;gap:2px;overflow:hidden\">\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"3aee350a-8756-4571-a932-3b1e8351b046\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Entradas a almacén<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#e3e5ee\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"47542c4f-5212-4cfe-a689-23b6c5b35649\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Salidas a almacén<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#e3e5ee\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"47542c4f-5212-4cfe-a689-23b6c5b35649\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Traspasos entre almacenes<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#e3e5ee\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"1eeb2926-598c-4264-8b3f-89155d26d42e\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Requisiciones de almacén<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#e3e5ee\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"e37331ac-0db4-406a-adfc-91019f99bc6b\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Inventario físico<\u002Fspan><\u002Fdiv>\n            <div style=\"height:1px;background:#e3e5ee\"><\u002Fdiv>\n            <div style=\"display:flex;align-items:center;gap:15px;padding:13px 10px\"><img src=\"b80986cb-28c9-4bd0-bbbb-8303f4e56df7\" style=\"width:42px;height:42px\"><span style=\"font:400 16px Roboto;color:#20242e\">Conteo cíclico<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== 2 · PITCH ==================== -->\n<section data-label=\"Por qué\" data-speaker-notes=\"El reto del almacén: capturas en papel, errores de tecleo y falta de visibilidad. MozartMovil ataca las tres fugas. Un mismo gesto — escanear — mueve todo el inventario.\" style=\"background:#eef0f7;font-family:'Space Grotesk',sans-serif;overflow:hidden\">\n  <div style=\"position:absolute;inset:0;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div class=\"r\" style=\"font:600 22px Roboto;letter-spacing:3px;color:#1E38E5;margin-bottom:16px\">POR QUÉ CONTROL DE ALMACÉN<\u002Fdiv>\n    <h2 class=\"r\" style=\"margin:0;font:700 64px/1.03 'Space Grotesk';color:#0e1230;letter-spacing:-1.5px;animation-delay:.06s;max-width:1150px\">Un mismo gesto mueve<br>todo tu inventario.<\u002Fh2>\n    <div style=\"display:flex;gap:28px;margin-top:60px\">\n      <div class=\"zoom\" style=\"flex:1;background:#fff;border-radius:22px;padding:40px 38px;box-shadow:0 20px 50px rgba(20,30,90,.08);animation-delay:.12s\">\n        <div style=\"width:70px;height:70px;border-radius:18px;background:#eef1ff;display:flex;align-items:center;justify-content:center;margin-bottom:26px\"><img src=\"3aee350a-8756-4571-a932-3b1e8351b046\" style=\"width:46px;height:46px\"><\u002Fdiv>\n        <div style=\"font:700 33px 'Space Grotesk';color:#0e1230;margin-bottom:12px\">Escanea, no teclees<\u002Fdiv>\n        <div style=\"font:400 25px/1.5 Roboto;color:#5b6180\">Cada artículo entra por código de barras. La cantidad se acumula sola, sin dato mal capturado.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"zoom\" style=\"flex:1;background:#fff;border-radius:22px;padding:40px 38px;box-shadow:0 20px 50px rgba(20,30,90,.08);animation-delay:.22s\">\n        <div style=\"width:70px;height:70px;border-radius:18px;background:#fff2df;display:flex;align-items:center;justify-content:center;margin-bottom:26px\"><img src=\"47542c4f-5212-4cfe-a689-23b6c5b35649\" style=\"width:46px;height:46px\"><\u002Fdiv>\n        <div style=\"font:700 33px 'Space Grotesk';color:#0e1230;margin-bottom:12px\">Un flujo para todo<\u002Fdiv>\n        <div style=\"font:400 25px/1.5 Roboto;color:#5b6180\">Entradas, salidas, traspasos o requisiciones: el mismo gesto de escaneo cambia solo el destino.<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"zoom\" style=\"flex:1;background:#fff;border-radius:22px;padding:40px 38px;box-shadow:0 20px 50px rgba(20,30,90,.08);animation-delay:.32s\">\n        <div style=\"width:70px;height:70px;border-radius:18px;background:#eaf7fc;display:flex;align-items:center;justify-content:center;margin-bottom:26px\"><img src=\"e37331ac-0db4-406a-adfc-91019f99bc6b\" style=\"width:46px;height:46px\"><\u002Fdiv>\n        <div style=\"font:700 33px 'Space Grotesk';color:#0e1230;margin-bottom:12px\">Existencias en tiempo real<\u002Fdiv>\n        <div style=\"font:400 25px/1.5 Roboto;color:#5b6180\">Cada movimiento viaja solo a Mozart. El inventario está siempre al día, sin recapturas.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== 3 · HUB (MainActivity) ==================== -->\n<section data-label=\"El menú\" data-speaker-notes=\"MainActivity: el menú principal. Según los permisos del usuario aparecen sus módulos, ordenados alfabéticamente. Un toque abre cada proceso.\" style=\"background:#eef0f7;font-family:'Space Grotesk',sans-serif;overflow:hidden\">\n  <div style=\"position:absolute;inset:0;display:flex;align-items:center;padding:0 120px;gap:90px\">\n    <div style=\"flex:1\">\n      <div class=\"r\" style=\"font:600 22px Roboto;letter-spacing:3px;color:#1E38E5;margin-bottom:16px\">UN SOLO PUNTO DE ENTRADA<\u002Fdiv>\n      <h2 class=\"r\" style=\"margin:0 0 26px;font:700 58px/1.04 'Space Grotesk';color:#0e1230;letter-spacing:-1.5px;animation-delay:.06s\">El menú principal<br>de MozartMovil<\u002Fh2>\n      <p class=\"r\" style=\"font:400 31px/1.5 Roboto;color:#5b6180;max-width:560px;animation-delay:.12s\">Cada operador ve solo los módulos que sus permisos habilitan. Desde aquí abre entradas, salidas, traspasos, requisiciones, inventario o los flujos de producción.<\u002Fp>\n      <div style=\"margin-top:38px;display:flex;flex-direction:column;gap:16px\">\n        <div class=\"r\" style=\"display:flex;align-items:center;gap:16px;animation-delay:.18s\"><div style=\"width:12px;height:12px;border-radius:50%;background:#1E38E5\"><\u002Fdiv><span style=\"font:500 21px Roboto;color:#2a2f4a\">Módulos por permiso, un toque por tarea<\u002Fspan><\u002Fdiv>\n        <div class=\"r\" style=\"display:flex;align-items:center;gap:16px;animation-delay:.24s\"><div style=\"width:12px;height:12px;border-radius:50%;background:#F5A200\"><\u002Fdiv><span style=\"font:500 21 ackground:#fff;border-radius:999px;font:500 18px Roboto;color:#2a2f4a;box-shadow:0 4px 14px rgba(20,30,90,.06);animation-delay:.3s\">Con observaciones<\u002Fspan>\n          <span class=\"listin\" style=\"padding:10px 18px;background:#fff;border-radius:999px;font:500 18px Roboto;color:#2a2f4a;box-shadow:0 4px 14px rgba(20,30,90,.06);animation-delay:.38s\">Sin detener el almacén<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fsection>\n\n<!-- ==================== 15 · RECAP · EL RECORRIDO ==================== -->\n<section data-label=\"Recap · el gesto\" data-speaker-notes=\"Recapitulando: sin importar el proceso, el recorrido es siempre el mismo — abrir el módulo, escanear los artículos, configurar el destino y confirmar. Cuatro pasos, un solo hábito para todo el almacén.\" style=\"background:#f6f7fb;font-family:'Space Grotesk',sans-serif;overflow:hidden\">\n  <div style=\"position:absolute;inset:0;padding:96px 120px;display:flex;flex-direction:column;justify-content:center\">\n    <div class=\"r\" style=\"font:600 22px Roboto;letter-spacing:3px;color:#1E38E5;margin-bottom:14px\">RECAPITULANDO · EL GESTO<\u002Fdiv>\n    <h2 class=\"r\" style=\"margin:0 0 12px;font:700 68px/1.04 'Space Grotesk';letter-spacing:-1.5px;color:#0c1024;animation-delay:.05s\">El mismo recorrido, siempre<\u002Fh2>\n    <p class=\"r\" style=\"font:400 26px/1.5 Roboto;color:#5a6178;max-width:1000px;margin:0 0 68px;animation-delay:.1s\">Cualquier operación del almacén se resuelve con cuatro pasos idénticos. Se aprende una vez y se aplica en todo.<\u002Fp>\n    <div style=\"position:relative;display:flex;justify-content:space-between;gap:32px\">\n      <div style=\"position:absolute;top:44px;left:44px;right:44px;height:4px;background:linear-gradient(90deg,#1E38E5,#7a8cff);border-radius:2px\" class=\"barfill\"><\u002Fdiv>\n      <div class=\"drop\" style=\"position:relative;flex:1;text-align:center;animation-delay:.2s\">\n        <div style=\"width:88px;height:88px;border-radius:24px;background:#1E38E5;color:#fff;font:700 40px 'Space Grotesk';display:flex;align-items:center;justify-content:center;margin:0 auto 26px;box-shadow:0 12px 30px rgba(30,56,229,.28)\">1<\u002Fdiv>\n        <div style=\"font:600 28px 'Space Grotesk';color:#0c1024;margin-bottom:8px\">Abrir módulo<\u002Fdiv>\n        <div style=\"font:400 20px/1.4 Roboto;color:#6b7288\">Un toque desde el menú según tus permisos<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"drop\" style=\"position:relative;flex:1;text-align:center;animation-delay:.32s\">\n        <div style=\"width:88px;height:88px;border-radius:24px;background:#1E38E5;color:#fff;font:700 40px 'Space Grotesk';display:flex;align-items:center;justify-content:center;margin:0 auto 26px;box-shadow:0 12px 30px rgba(30,56,229,.28)\">2<\u002Fdiv>\n        <div style=\"font:600 28px 'Space Grotesk';color:#0c1024;margin-bottom:8px\">Escanear<\u002Fdiv>\n        <div style=\"font:400 20px/1.4 Roboto;color:#6b7288\">Los artículos se acumulan por código y caducidad<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"drop\" style=\"position:relative;flex:1;text-align:center;animation-delay:.44s\">\n        <div style=\"width:88px;height:88px;border-radius:24px;background:#1E38E5;color:#fff;font:700 40px 'Space Grotesk';display:flex;align-items:center;justify-content:center;margin:0 auto 26px;box-shadow:0 12px 30px rgba(30,56,229,.28)\">3<\u002Fdiv>\n        <div style=\"font:600 28px 'Space Grotesk';color:#0c1024;margin-bottom:8px\">Configurar<\u002Fdiv>\n        <div style=\"font:400 20px/1.4 Roboto;color:#6b7288\">Almacén, destino y referencias del movimiento<\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"drop\" style=\"position:relative;flex:1;text-align:center;animation-delay:.56s\">\n        <div style=\"width:88px;height:88px;border-radius:24px;background:#0c1024;color:#fff;font:700 40px 'Space Grotesk';display:flex;align-items:center;justify-content:center;margin:0 auto 26px;box-shadow:0 12px 30
